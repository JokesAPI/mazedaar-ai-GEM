<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mazedaar AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    #chatbox {
      width: 700px;
      max-width: 95%;
      background: white;
      padding: 20px;
      border-radius: 10px;
     box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    h2 {
      margin-top: 0;
      text-align: center;
      color: #0078D7;
    }
    #messages {
      height: 500px;
	    overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      background: #fafafa;
    }
    .message { margin: 6px 0; line-height: 1.5; }
    .user { color: blue; }
    .bot { color: green; }
    .error { color: red; }
    #inputRow {
      display: flex;
      gap: 8px;
    }
    #userInput {
      flex: 1;
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      padding: 10px 16px;
      font-size: 15px;
      background-color: #0078D7;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background-color: #005fa3; }
    #langLabel {
      font-size: 12px;
      color: #888;
      text-align: right;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div id="chatbox">
    <h2>Mazedaar AI</h2>
    <div id="messages">
      <div class="message bot"><b>Bot:</b> Namaste! I am Mazedaar AI. Ask me anything or say "hindi joke" / "telugu joke"!</div>
    </div>
    <div id="langLabel">Language: auto-detect</div>
    <div id="inputRow">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    document.getElementById("userInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendMessage();
    });

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();
      if (!message) return;

      const messagesDiv = document.getElementById("messages");
      const langLabel = document.getElementById("langLabel");

      messagesDiv.innerHTML += `<div class="message user"><b>You:</b> ${message}</div>`;
      input.value = "";
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      const typingId = "typing_" + Date.now();
      messagesDiv.innerHTML += `<div class="message bot" id="${typingId}"><b>Bot:</b> typing...</div>`;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      try {
        const response = await fetch("https://mazedaar-ai.onrender.com/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: message, session_id: "user1" })
        });

        const data = await response.json();
        document.getElementById(typingId).remove();

        if (data.error) {
          messagesDiv.innerHTML += `<div class="message error"><b>Bot:</b> Error: ${data.error}</div>`;
        } else {
          messagesDiv.innerHTML += `<div class="message bot"><b>Bot:</b> ${data.response}</div>`;
          if (data.language_detected) {
            langLabel.innerText = "Language detected: " + data.language_detected;
          }
        }

      } catch (error) {
        document.getElementById(typingId).remove();
        messagesDiv.innerHTML += `<div class="message error"><b>Bot:</b> Error connecting to server. Make sure app.py is running.</div>`;
      }

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  </script>
</body>
</html>
